<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="upload-form">
        <input type="text" name="title" placeholder="Paper Title" required>
        <input type="text" name="department" placeholder="Department" required>
        <input type="text" name="subject" placeholder="Subject" required>
        <input type="number" name="year" placeholder="Year" required>
        <input type="number" name="semester" placeholder="Semester" required>
        <input type="file" name="file" accept=".pdf" required>
        <button type="submit">Upload Paper</button>
      </form>
      
      <script>
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const formData = new FormData(e.target);
          
          try {
            const response = await fetch('http://localhost:5000/api/papers', {
              method: 'POST',
              body: formData
            });
            
            if (response.ok) {
              alert('Paper uploaded successfully!');
              window.location.href = '/';
            }
          } catch (error) {
            console.error('Upload failed:', error);
          }
        });
      </script>
</body>
</html>
